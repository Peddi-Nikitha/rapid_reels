name: rapid_reels_app
description: "Rapid Reels - Instant event reel creation and editing platform"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.0
  
  # UI Components
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.14
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.1.3
  
  # Navigation
  go_router: ^14.6.2
  
  # Utilities
  intl: ^0.20.1
  uuid: ^4.5.1
  geolocator: ^13.0.2
  permission_handler: ^11.3.1
  image_picker: ^1.1.2
  video_player: ^2.9.2
  share_plus: ^10.1.3
  url_launcher: ^6.3.1
  
  # Local Storage
  shared_preferences: ^2.3.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Maps
  google_maps_flutter: ^2.9.0
  
  # Other
  carousel_slider: ^5.0.0
  dots_indicator: ^3.0.0
  flutter_rating_bar: ^4.0.1
  table_calendar: ^3.1.2
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/images/cities/
    - assets/images/splash_screen.jpg
    - assets/icons/
    - assets/lottie/
    - assets/videos/
